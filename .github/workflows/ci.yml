name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "meta-sigma-racer-wingman/**"
      - "conf/**"
      - "scripts/**"
      - "setup-environment.sh"
      - "release-manifest.json"
      - "kas.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "meta-sigma-racer-wingman/**"
      - "conf/**"
      - "scripts/**"
      - "setup-environment.sh"
      - "release-manifest.json"
      - "kas.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bitbake-virt:
    runs-on: [self-hosted, yocto]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v5
        with:
          path: embedded/sigma-racer-wingman

      - uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation

      # cluster, telemetry, sidearm, and vehicle now live in the sigma-racer
      # monorepo; the recipes point at ${TOPDIR}/../../sigma-racer/<crate>.
      - uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/sigma-racer
          path: embedded/sigma-racer

      - uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/vss-map
          path: embedded/vss-map

      - name: Bitbake virt image
        env:
          EMBEDDED_ROOT: ${{ github.workspace }}/embedded
          SKIP_SIBLING_CHECKOUT: "1"
        run: |
          chmod +x embedded/sigma-racer-wingman/scripts/ci/*.sh
          embedded/sigma-racer-wingman/scripts/ci/bitbake-virt.sh
