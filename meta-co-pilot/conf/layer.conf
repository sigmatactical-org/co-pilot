# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "co-pilot"
BBFILE_PATTERN_co-pilot = "^${LAYERDIR}/"
BBFILE_PRIORITY_co-pilot = "20"

LAYERDEPENDS_co-pilot = "core openembedded-layer"
# meta-imx, meta-freescale, meta-rust, meta-rauc added via bblayers.conf.sample
LAYERSERIES_COMPAT_co-pilot = "scarthgap"

# Instrumentation UI — sole application (co-pilot/instrumentation → ../instrumentation)
CO_PILOT_ROOT ??= "${LAYERDIR}/../.."
SIGMA_INSTRUMENTATION_SRC ??= "${CO_PILOT_ROOT}/instrumentation"

LICENSE_PATH += "${LAYERDIR}/licenses"
