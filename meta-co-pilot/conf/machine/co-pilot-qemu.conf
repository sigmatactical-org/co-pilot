# Sigma Co-Pilot — QEMU x86-64 virtual target for local integration testing
# Same 800×480 cluster layout as co-pilot-imx8mp; no NXP BSP required.

require conf/machine/qemux86-64.conf

MACHINE = "co-pilot-qemu"
# Use "virt" not "qemu" — PN "qemu" in OVERRIDES triggers fatal pkgvarcheck QA errors.
MACHINEOVERRIDES =. "co-pilot:virt:"

MACHINE_FEATURES:append = " wifi"

CO_PILOT_DISPLAY_WIDTH = "800"
CO_PILOT_DISPLAY_HEIGHT = "480"

PREFERRED_PROVIDER_virtual/kernel = "linux-yocto"

# ext4 rootfs for runqemu (skip A/B WIC layout used on hardware)
WKS_FILE = ""
IMAGE_FSTYPES:pn-co-pilot-image = "ext4"

# No hardware video codecs on the virtual target
IMAGE_FEATURES:remove = " hwcodec"

# QEMU window matches the cluster panel (800×480)
QB_MEM = "-m 4096"
QB_SMP = "-smp 4"
QB_GRAPHICAL = "-display gtk,window-size=800x480 -device virtio-gpu-pci"
