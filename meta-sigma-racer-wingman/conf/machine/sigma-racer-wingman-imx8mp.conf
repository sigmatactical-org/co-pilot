# Sigma Sigma Racer Wingman — NXP i.MX 8M Plus reference platform
# Requires: meta-imx, meta-freescale, imx8mp-lpddr4-evk machine support

require conf/machine/imx8mp-lpddr4-evk.conf

MACHINE = "sigma-racer-wingman-imx8mp"
MACHINEOVERRIDES =. "sigma-racer-wingman:imx8mpevk:"

MACHINE_FEATURES:append = " wifi bluetooth can"

# 800×480 or 1280×720 cluster panel — adjust per hardware
SIGMA_RACER_WINGMAN_DISPLAY_WIDTH = "800"
SIGMA_RACER_WINGMAN_DISPLAY_HEIGHT = "480"

# CAN interface for Linux infotainment bus (FLEXCAN2 — FLEXCAN1 is M7 safety).
SIGMA_RACER_WINGMAN_CAN_IFACE = "can1"

# Boot partition size for A/B kernel + dtb artifacts
SIGMA_RACER_WINGMAN_BOOT_PART_SIZE = "128M"

# GPU memory split for 60 FPS Slint UI
IMX_GPU_MEM_SIZE ?= "512"

# M7 safety-core firmware (remoteproc). QEMU virt keeps the packagegroup
# default (0) — no Cortex-M7 there.
INCLUDE_SIDEARM_FIRMWARE = "1"

WKS_FILE = "sigma-racer-wingman-ab.wks.in"

# RAUC A/B: slot-selecting boot script in the boot FAT (loaded as bsp_script).
IMAGE_BOOT_FILES:append = " boot.scr"
EXTRA_IMAGEDEPENDS:append = " sigma-racer-wingman-boot-script"
