# Sigma Sigma Racer Wingman — QEMU x86-64 virtual target for local integration testing
# Same 800×480 cluster layout as sigma-racer-wingman-imx8mp; no NXP BSP required.

require conf/machine/qemux86-64.conf

MACHINE = "sigma-racer-wingman-qemu"
# Inherit qemux86-64 kernel/features; custom MACHINE name needs explicit KMACHINE.
MACHINEOVERRIDES =. "qemux86-64:sigma-racer-wingman:virt:"
KMACHINE = "qemux86-64"

MACHINE_FEATURES:append = " wifi can"

SIGMA_RACER_WINGMAN_DISPLAY_WIDTH = "800"
SIGMA_RACER_WINGMAN_DISPLAY_HEIGHT = "480"

# Virtual CAN for QEMU integration testing
SIGMA_RACER_WINGMAN_CAN_IFACE = "vcan0"

PREFERRED_PROVIDER_virtual/kernel = "linux-yocto"

# ext4 rootfs for runqemu (skip A/B WIC layout used on hardware)
WKS_FILE = ""
IMAGE_FSTYPES:pn-sigma-racer-wingman-image = "ext4"

# No hardware video codecs on the virtual target
IMAGE_FEATURES:remove = " hwcodecs"

# QEMU: virtio-gpu for Weston DRM (runqemu reads QB_GRAPHICS, not QB_GRAPHICAL)
QB_MEM = "-m 4096"
QB_SMP = "-smp 4"
QB_GRAPHICS = "-device virtio-gpu-pci"
