# Sigma Sigma Racer Wingman — NXP i.MX 95 class platform
# Requires: meta-imx with i.MX 95 BSP support (layer revision dependent)

# When meta-imx provides imx95 machine config, inherit it:
# require conf/machine/imx95-19x19-lpddr4x-evk.conf

MACHINE = "sigma-racer-wingman-imx95"
MACHINEOVERRIDES =. "sigma-racer-wingman:imx95:"

MACHINE_FEATURES:append = " wifi bluetooth can vulkan"

SIGMA_RACER_WINGMAN_DISPLAY_WIDTH = "1280"
SIGMA_RACER_WINGMAN_DISPLAY_HEIGHT = "720"
SIGMA_RACER_WINGMAN_CAN_IFACE = "can0"
SIGMA_RACER_WINGMAN_BOOT_PART_SIZE = "128M"

WKS_FILE = "sigma-racer-wingman-ab.wks.in"

# Placeholder until imx95 machine is available in your meta-imx checkout:
# Uncomment and adjust when BSP is integrated:
# require conf/machine/imx95-19x19-lpddr4x-evk.conf

# Guard: without the meta-imx base machine include above, this MACHINE has no
# SoC tune/kernel/bootloader definition and would build a silently-broken image.
# Fail loudly until the BSP is integrated (the base require sets SOC_FAMILY).
python () {
    if not d.getVar('SOC_FAMILY'):
        bb.fatal(
            "sigma-racer-wingman-imx95 has no i.MX95 BSP wired in yet: uncomment the "
            "'require conf/machine/imx95-19x19-lpddr4x-evk.conf' line in "
            "conf/machine/sigma-racer-wingman-imx95.conf and add meta-imx with i.MX95 "
            "support before building this MACHINE."
        )
}
