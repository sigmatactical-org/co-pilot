[core]
# desktop-shell exposes xdg_wm_base (required by Slint backend-winit / winit)
shell=desktop-shell.so
modules=
backend=drm-backend.so
require-input=false
idle-time=0

[shell]
background-color=0xff141414
panel-location=none
locking=false

[output]
# Match sigma-racer-wingman-qemu 800×480 cluster panel (same as imx8mp weston.ini).
# Without a fixed mode, virtio often prefers 1024×768 and the host SDL window
# height-scales the framebuffer — cropping dial + speed on the right.
mode=800x480
transform=normal
scale=1

[keyboard]
keymap_layout=us
