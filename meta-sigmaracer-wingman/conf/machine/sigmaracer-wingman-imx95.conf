# Sigma Sigma Racer Wingman — NXP i.MX 95 class platform
# Requires: meta-imx with i.MX 95 BSP support (layer revision dependent)

# When meta-imx provides imx95 machine config, inherit it:
# require conf/machine/imx95-19x19-lpddr4x-evk.conf

MACHINE = "sigmaracer-wingman-imx95"
MACHINEOVERRIDES =. "sigmaracer-wingman:imx95:"

MACHINE_FEATURES:append = " wifi bluetooth can vulkan"

SIGMARACER_WINGMAN_DISPLAY_WIDTH = "1280"
SIGMARACER_WINGMAN_DISPLAY_HEIGHT = "720"
SIGMARACER_WINGMAN_CAN_IFACE = "can0"
SIGMARACER_WINGMAN_BOOT_PART_SIZE = "128M"

WKS_FILE = "sigmaracer-wingman-ab.wks.in"

# Placeholder until imx95 machine is available in your meta-imx checkout:
# Uncomment and adjust when BSP is integrated:
# require conf/machine/imx95-19x19-lpddr4x-evk.conf
