# Sigma Sigma Racer Wingman — QEMU x86-64 virtual target for local integration testing
# Same 800×480 cluster layout as sigmaracer-wingman-imx8mp; no NXP BSP required.

require conf/machine/qemux86-64.conf

MACHINE = "sigmaracer-wingman-qemu"
# Use "virt" not "qemu" — PN "qemu" in OVERRIDES triggers fatal pkgvarcheck QA errors.
MACHINEOVERRIDES =. "sigmaracer-wingman:virt:"

MACHINE_FEATURES:append = " wifi"

SIGMARACER_WINGMAN_DISPLAY_WIDTH = "800"
SIGMARACER_WINGMAN_DISPLAY_HEIGHT = "480"

PREFERRED_PROVIDER_virtual/kernel = "linux-yocto"

# ext4 rootfs for runqemu (skip A/B WIC layout used on hardware)
WKS_FILE = ""
IMAGE_FSTYPES:pn-sigmaracer-wingman-image = "ext4"

# No hardware video codecs on the virtual target
IMAGE_FEATURES:remove = " hwcodec"

# QEMU: virtio-gpu for Weston DRM (runqemu reads QB_GRAPHICS, not QB_GRAPHICAL)
QB_MEM = "-m 4096"
QB_SMP = "-smp 4"
QB_GRAPHICS = "-device virtio-gpu-pci"
