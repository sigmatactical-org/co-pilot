# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "sigmaracer-wingman"
BBFILE_PATTERN_sigmaracer-wingman = "^${LAYERDIR}/"
BBFILE_PRIORITY_sigmaracer-wingman = "20"

LAYERDEPENDS_sigmaracer-wingman = "core openembedded-layer"
# meta-imx, meta-freescale, meta-rust, meta-rauc added via bblayers.conf.sample
LAYERSERIES_COMPAT_sigmaracer-wingman = "scarthgap"

# Instrumentation UI — sole application (sigmaracer-wingman/sigmaracer-instrumentation → ../sigmaracer-instrumentation)
SIGMARACER_WINGMAN_ROOT ??= "${LAYERDIR}/../.."
SIGMA_INSTRUMENTATION_SRC ??= "${SIGMARACER_WINGMAN_ROOT}/sigmaracer-instrumentation"

LICENSE_PATH += "${LAYERDIR}/licenses"
