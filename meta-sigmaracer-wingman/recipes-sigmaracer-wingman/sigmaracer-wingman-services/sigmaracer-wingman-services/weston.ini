[core]
# Compositor only — instrumentation (sigma-dash) is the sole UI client
shell=desktop-shell.so
modules=
backend=drm-backend.so

[libinput]
enable_tap=true

[shell]
background-color=0xff000000
panel-location=none
locking=false
closing-animation=none
cursor-theme=blank
cursor-size=0

[output]
name=HDMI-A-1
mode=800x480@60
transform=normal
scale=1

[keyboard]
keymap_layout=us
